<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCA Device Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <header class="text-white shadow-md px-6 py-4 flex justify-between items-center" style="background-color: #c80206;">
        <div>
            <h1 class="text-xl font-black tracking-wide">CCA Device Manager</h1>
            <p class="text-xs opacity-90">K-12 Chromebook Management Portal</p>
        </div>
        <div class="text-right">
            <span id="current-view" class="bg-black/20 px-3 py-1 rounded-full text-xs font-semibold">Live Database Mode</span>
        </div>
    </header>

    <main class="max-w-6xl mx-auto p-4 md:p-6 space-y-6">

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-gray-100 pb-4 mb-4 gap-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">Central Scan Station</h2>
                    <p class="text-sm text-gray-500">Scan student barcode sheet or type manually</p>
                </div>
                
                <div class="flex bg-gray-100 p-1 rounded-xl w-fit">
                    <button id="btn-checkout" onclick="setMode('checkout')" class="px-4 py-2 text-sm font-semibold rounded-lg bg-white shadow-sm transition-all" style="color: #c80206;">
                        🚀 Check Out
                    </button>
                    <button id="btn-checkin" onclick="setMode('checkin')" class="px-4 py-2 text-sm font-semibold rounded-lg text-gray-600 hover:text-gray-900 transition-all">
                        📥 Check In
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">1. Student ID / Name</label>
                    <input type="text" id="student-input" placeholder="Scan sheet or type student info..." 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:bg-white transition-all text-base focus:ring-[#c80206]">
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">2. Chromebook Asset Tag</label>
                    <input type="text" id="asset-input" placeholder="Scan device barcode tag..." 
                           class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:bg-white transition-all text-base focus:ring-[#c80206]">
                </div>
            </div>
            
            <div id="scan-feedback" class="mt-4 p-3 rounded-xl text-sm font-medium hidden"></div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">Classroom Cart Visualizer</h2>
                    <p class="text-sm text-gray-500">Select a slot to quickly toggle status or report an issue</p>
                </div>
                <select id="cart-selector" onchange="loadCartData()" class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-1.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-[#c80206]">
                    <option value="7th-Grade-Cart-A">7th Grade - Cart A</option>
                    <option value="7th-Grade-Cart-B">7th Grade - Cart B</option>
                    <option value="6th-Grade-Cart-A">6th Grade - Cart A</option>
                </select>
            </div>

            <div id="cart-grid" class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-10 gap-3">
                <div class="col-span-full text-center py-8 text-gray-400 text-sm">Connecting to Firebase...</div>
            </div>
        </section>

    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Your real Firebase Configuration Details
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "cca-device-manager.firebaseapp.com",
            databaseURL: "https://cca-device-manager-default-rtdb.firebaseio.com",
            projectId: "cca-device-manager",
            storageBucket: "cca-device-manager.appspot.com",
            messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID_HERE",
            appId: "PASTE_YOUR_APP_ID_HERE"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentMode = 'checkout';

        function setMode(mode) {
            currentMode = mode;
            const btnCheckout = document.getElementById('btn-checkout');
            const btnCheckin = document.getElementById('btn-checkin');
            
            if (mode === 'checkout') {
                btnCheckout.className = "px-4 py-2 text-sm font-semibold rounded-lg bg-white shadow-sm transition-all";
                btnCheckout.style.color = "#c80206";
                btnCheckin.className = "px-4 py-2 text-sm font-semibold rounded-lg text-gray-600 hover:text-gray-900 transition-all";
                btnCheckin.style.color = "";
                document.getElementById('student-input').disabled = false;
                document.getElementById('student-input').placeholder = "Scan sheet or type student info...";
            } else {
                btnCheckin.className = "px-4 py-2 text-sm font-semibold rounded-lg bg-white shadow-sm transition-all";
                btnCheckin.style.color = "#c80206";
                btnCheckout.className = "px-4 py-2 text-sm font-semibold rounded-lg text-gray-600 hover:text-gray-900 transition-all";
                btnCheckout.style.color = "";
                document.getElementById('student-input').placeholder = "(Optional for Check-In)";
            }
        }

        // Load Cart Data Dynamically from Firebase Realtime Database
        function loadCartData() {
            const selectedCart = document.getElementById('cart-selector').value;
            const gridContainer = document.getElementById('cart-grid');
            
            database.ref('carts/' + selectedCart).on('value', (snapshot) => {
                gridContainer.innerHTML = ''; 
                const data = snapshot.val();
                
                if (!data) {
                    initializeEmptyCart(selectedCart);
                    return;
                }

                Object.keys(data).forEach((slotId) => {
                    const slotData = data[slotId];
                    const slotElement = document.createElement('button');
                    
                    let statusColor = "bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100";
                    if (slotData.status === 'Missing') statusColor = "bg-orange-50 text-orange-700 border-orange-200 hover:bg-orange-100";
                    if (slotData.status === 'Out') statusColor = "bg-yellow-50 text-yellow-700 border-yellow-200 hover:bg-yellow-100";
                    if (slotData.status === 'Repair') statusColor = "bg-rose-50 text-rose-700 border-rose-200 hover:bg-rose-100";

                    slotElement.className = `flex flex-col items-center justify-center p-3 rounded-xl border transition-all cursor-pointer ${statusColor}`;
                    slotElement.innerHTML = `
                        <span class="text-xs font-bold uppercase tracking-wider opacity-60">Slot</span>
                        <span class="text-xl font-black">${slotData.number}</span>
                        <span class="text-[10px] font-bold mt-1 uppercase tracking-wide px-1.5 py-0.5 rounded-md bg-white/60">${slotData.status}</span>
                    `;
                    
                    slotElement.onclick = () => {
                        let nextStatus = 'In Cart';
                        if (slotData.status === 'In Cart') nextStatus = 'Out';
                        else if (slotData.status === 'Out') nextStatus = 'Missing';
                        else if (slotData.status === 'Missing') nextStatus = 'Repair';
                        
                        database.ref('carts/' + selectedCart + '/' + slotId).update({
                            status: nextStatus
                        });
                    };
                    
                    gridContainer.appendChild(slotElement);
                });
            });
        }

        function initializeEmptyCart(cartId) {
            const initialData = {};
            for (let i = 1; i <= 30; i++) {
                initialData['slot_' + i] = {
                    number: i,
                    status: 'In Cart',
                    assignedTo: ''
                };
            }
            database.ref('carts/' + cartId).set(initialData);
        }

        loadCartData();
    </script>
</body>
</html>
