<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCA Device Manager</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts: Montserrat -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <!-- Top Navigation Bar (Custom CCA Crimson #c80206) -->
    <header class="text-white shadow-md px-6 py-4 flex justify-between items-center" style="background-color: #c80206;">
        <div>
            <h1 class="text-xl font-black tracking-wide">CCA Device Manager</h1>
            <p class="text-xs opacity-90">K-12 Chromebook Management Portal</p>
        </div>
        <div class="text-right">
            <span id="current-view" class="bg-black/20 px-3 py-1 rounded-full text-xs font-semibold">Live Database Mode</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">

        <!-- Section 1: The Scanning Kiosk Area -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-gray-100 pb-4 mb-4 gap-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">Central Scan Station</h2>
                    <p class="text-sm text-gray-500">Scan student barcode sheet or link manually below</p>
                </div>
                
                <!-- Expanded Toggle Switch for Log Modes -->
                <div class="flex bg-gray-100 p-1 rounded-xl w-fit flex-wrap gap-1">
                    <button id="btn-checkout" onclick="setMode('checkout')" class="px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg bg-white shadow-sm transition-all" style="color: #c80206;">
                        🚀 Signed Out
                    </button>
                    <button id="btn-overnight" onclick="setMode('overnight')" class="px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg text-gray-600 hover:text-gray-900 transition-all">
                        🌙 Overnight Loan
                    </button>
                    <button id="btn-checkin" onclick="setMode('checkin')" class="px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg text-gray-600 hover:text-gray-900 transition-all">
                        📥 Check In
                    </button>
                </div>
            </div>

            <!-- Inputs & Action Button -->
            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">1. Student Name / ID</label>
                        <input type="text" id="student-input" placeholder="Type name or scan sheet..." 
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:bg-white transition-all text-base focus:ring-[#c80206]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">2. Cart Slot Number</label>
                        <input type="number" id="slot-input" min="1" max="30" placeholder="e.g. 14" 
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:bg-white transition-all text-base focus:ring-[#c80206]">
                    </div>
                    <div class="flex items-end">
                        <button onclick="processTransaction()" class="w-full text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md active:scale-98 cursor-pointer" style="background-color: #c80206;">
                            Submit Transaction
                        </button>
                    </div>
                </div>
                
                <!-- Status Feedback message bar -->
                <div id="scan-feedback" class="p-4 rounded-xl text-sm font-semibold hidden transition-all"></div>
            </div>
        </section>

        <!-- Section 2: Visual Cart Grid View -->
        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">Classroom Cart Visualizer</h2>
                    <p class="text-sm text-gray-500">Click a slot to quickly view assignment details or run instant overrides</p>
                </div>
                <select id="cart-selector" onchange="loadCartData()" class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-1.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-[#c80206]">
                    <option value="7th-Grade-Cart-A">7th Grade - Cart A</option>
                    <option value="7th-Grade-Cart-B">7th Grade - Cart B</option>
                    <option value="6th-Grade-Cart-A">6th Grade - Cart A</option>
                </select>
            </div>

            <!-- Grid container forced to 15 columns on wide screens (two rows of 15) -->
            <div id="cart-grid" class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-15 gap-2.5">
                <div class="col-span-full text-center py-8 text-gray-400 text-sm">Connecting to Firebase...</div>
            </div>
        </section>

    </main>

    <!-- Firebase Compatibility SDK Core Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

    <script>
        // Your real Firebase Configuration Details
        const firebaseConfig = {
            apiKey: "PASTE_YOUR_API_KEY_HERE",
            authDomain: "cca-device-manager.firebaseapp.com",
            databaseURL: "https://cca-device-manager-default-rtdb.firebaseio.com/",
            projectId: "cca-device-manager",
            storageBucket: "cca-device-manager.appspot.com",
            messagingSenderId: "PASTE_YOUR_MESSAGING_SENDER_ID_HERE",
            appId: "PASTE_YOUR_APP_ID_HERE"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let currentMode = 'checkout';

        function setMode(mode) {
            currentMode = mode;
            const btnCheckout = document.getElementById('btn-checkout');
            const btnOvernight = document.getElementById('btn-overnight');
            const btnCheckin = document.getElementById('btn-checkin');
            
            [btnCheckout, btnOvernight, btnCheckin].forEach(btn => {
                btn.className = "px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg text-gray-600 hover:text-gray-900 transition-all";
                btn.style.color = "";
            });
            
            if (mode === 'checkout') {
                btnCheckout.className = "px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg bg-white shadow-sm transition-all";
                btnCheckout.style.color = "#c80206";
                document.getElementById('student-input').disabled = false;
                document.getElementById('student-input').placeholder = "Type name or scan sheet...";
            } else if (mode === 'overnight') {
                btnOvernight.className = "px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg bg-white shadow-sm transition-all";
                btnOvernight.style.color = "#c80206";
                document.getElementById('student-input').disabled = false;
                document.getElementById('student-input').placeholder = "Enter student taking device home...";
            } else {
                btnCheckin.className = "px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg bg-white shadow-sm transition-all";
                btnCheckin.style.color = "#c80206";
                document.getElementById('student-input').disabled = true;
                document.getElementById('student-input').placeholder = "(Slot update only)";
            }
        }

        // Process kiosk scan station updates
        function processTransaction() {
            const selectedCart = document.getElementById('cart-selector').value;
            const studentName = document.getElementById('student-input').value.trim();
            const slotNum = document.getElementById('slot-input').value.trim();
            const feedback = document.getElementById('scan-feedback');

            if (!slotNum || slotNum < 1 || slotNum > 30) {
                showFeedback("Please enter a valid slot number (1-30).", "bg-red-50 text-red-700 border border-red-200");
                return;
            }

            if (currentMode !== 'checkin' && !studentName) {
                showFeedback("Student identity is required for sign-out or overnight loans.", "bg-red-50 text-red-700 border border-red-200");
                return;
            }

            const slotId = 'slot_' + slotNum;
            let targetStatus = 'In Cart';
            let assignedUser = '';

            if (currentMode === 'checkout') {
                targetStatus = 'Signed Out';
                assignedUser = studentName;
            } else if (currentMode === 'overnight') {
                targetStatus = 'Overnight';
                assignedUser = studentName;
            }

            // Sync structural parameters straight to the specific Firebase slot node
            database.ref('carts/' + selectedCart + '/' + slotId).update({
                status: targetStatus,
                assignedTo: assignedUser
            }).then(() => {
                if (currentMode === 'checkin') {
                    showFeedback(`Slot ${slotNum} is safely back in the cart.`, "bg-emerald-50 text-emerald-700 border border-emerald-200");
                } else {
                    showFeedback(`Slot ${slotNum} assigned successfully to ${studentName}!`, "bg-blue-50 text-blue-700 border border-blue-200");
                }
                // Clear fields cleanly for next entry
                document.getElementById('student-input').value = '';
                document.getElementById('slot-input').value = '';
            });
        }

        function showFeedback(msg, classes) {
            const feedback = document.getElementById('scan-feedback');
            feedback.innerText = msg;
            feedback.className = `p-4 rounded-xl text-sm font-semibold transition-all ${classes}`;
            feedback.classList.remove('hidden');
            setTimeout(() => feedback.classList.add('hidden'), 5000); // clear note in 5s
        }

        // Load Cart Data Dynamically from Firebase Realtime Database
        function loadCartData() {
            const selectedCart = document.getElementById('cart-selector').value;
            const gridContainer = document.getElementById('cart-grid');
            
            database.ref('carts/' + selectedCart).on('value', (snapshot) => {
                gridContainer.innerHTML = ''; 
                const data = snapshot.val();
                
                if (!data) {
                    initializeEmptyCart(selectedCart);
                    return;
                }

                const sortedKeys = Object.keys(data).sort((a, b) => {
                    const numA = parseInt(a.replace('slot_', ''), 10);
                    const numB = parseInt(b.replace('slot_', ''), 10);
                    return numA - numB;
                });

                sortedKeys.forEach((slotId) => {
                    const slotData = data[slotId];
                    const slotElement = document.createElement('button');
                    
                    let currentStatus = slotData.status;
                    let currentUser = slotData.assignedTo || '';
                    
                    let statusColor = "bg-emerald-50 text-emerald-700 border-emerald-200 hover:bg-emerald-100";
                    if (currentStatus === 'Missing') statusColor = "bg-orange-50 text-orange-700 border-orange-200 hover:bg-orange-100";
                    if (currentStatus === 'Signed Out') statusColor = "bg-yellow-50 text-yellow-700 border-yellow-200 hover:bg-yellow-100";
                    if (currentStatus === 'Repair') statusColor = "bg-rose-50 text-rose-700 border-rose-200 hover:bg-rose-100";
                    if (currentStatus === 'Overnight') statusColor = "bg-purple-50 text-purple-700 border-purple-200 hover:bg-purple-100";

                    slotElement.className = `flex flex-col items-center justify-between p-2 rounded-xl border transition-all cursor-pointer ${statusColor} min-h-[84px] text-center`;
                    
                    // Display name inside the slot card if it's assigned to someone
                    let userLabel = currentUser ? `<span class="text-[9px] font-medium tracking-tight truncate w-full block text-gray-600 mt-0.5 bg-white/40 rounded px-0.5">${currentUser}</span>` : '';
                    
                    slotElement.innerHTML = `
                        <div>
                            <span class="text-[9px] font-bold uppercase tracking-wider opacity-50 block leading-none">Slot</span>
                            <span class="text-lg font-black leading-none">${slotData.number}</span>
                        </div>
                        ${userLabel}
                        <span class="text-[9px] font-bold uppercase tracking-wide px-1 py-0.5 rounded bg-white/70 text-center w-full truncate leading-none mt-1">${currentStatus}</span>
                    `;
                    
                    // Clicking a slot prompts a quick detail check or fast state cycle override
                    slotElement.onclick = () => {
                        if(currentUser) {
                            if(confirm(`Slot ${slotData.number} is currently held by: ${currentUser}.\n\nWould you like to clear this and check the device back into the cart?`)) {
                                database.ref('carts/' + selectedCart + '/' + slotId).update({ status: 'In Cart', assignedTo: '' });
                            }
                        } else {
                            let nextStatus = 'In Cart';
                            if (currentStatus === 'In Cart') nextStatus = 'Signed Out';
                            else if (currentStatus === 'Signed Out') nextStatus = 'Overnight';
                            else if (currentStatus === 'Overnight') nextStatus = 'Missing';
                            else if (currentStatus === 'Missing') nextStatus = 'Repair';
                            
                            database.ref('carts/' + selectedCart + '/' + slotId).update({ status: nextStatus });
                        }
                    };
                    
                    gridContainer.appendChild(slotElement);
                });
            });
        }

        function initializeEmptyCart(cartId) {
            const initialData = {};
            for (let i = 1; i <= 30; i++) {
                initialData['slot_' + i] = {
                    number: i,
                    status: 'In Cart',
                    assignedTo: ''
                };
            }
            database.ref('carts/' + cartId).set(initialData);
        }

        loadCartData();
    </script>
</body>
</html>
