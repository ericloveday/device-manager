<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCA Device Manager</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">

    <header class="text-white shadow-md px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4" style="background-color: #c80206;">
        <div>
            <h1 class="text-xl font-black tracking-wide">CCA Device Manager</h1>
            <p class="text-xs opacity-90">K-12 Chromebook Management Portal</p>
        </div>
        
        <div class="flex bg-black/20 p-1 rounded-xl text-sm font-bold">
            <button id="tab-kiosk" onclick="switchView('kiosk')" class="px-4 py-2 rounded-lg bg-white text-[#c80206] shadow transition-all cursor-pointer">
                🏫 Kiosk & Carts
            </button>
            <button id="tab-admin" onclick="switchView('admin')" class="px-4 py-2 rounded-lg text-white hover:bg-white/10 transition-all cursor-pointer">
                📊 Admin Fleet Dashboard
            </button>
        </div>
    </header>

    <main id="view-kiosk-container" class="max-w-7xl mx-auto p-4 md:p-6 space-y-6">

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between border-b border-gray-100 pb-4 mb-4 gap-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">Central Scan Station</h2>
                    <p class="text-sm text-gray-500">Scan devices to route them automatically based on their mapped locations.</p>
                </div>
                
                <div class="flex bg-gray-100 p-1 rounded-xl w-fit flex-wrap gap-1">
                    <button id="btn-checkout" onclick="setMode('checkout')" class="px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg bg-white shadow-sm transition-all" style="color: #c80206;">
                        🚀 Out
                    </button>
                    <button id="btn-overnight" onclick="setMode('overnight')" class="px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg text-gray-600 hover:text-gray-900 transition-all">
                        🌙 Overnight Loan
                    </button>
                    <button id="btn-checkin" onclick="setMode('checkin')" class="px-3 py-1.5 text-xs md:text-sm font-semibold rounded-lg text-gray-600 hover:text-gray-900 transition-all">
                        📥 Check In
                    </button>
                </div>
            </div>

            <div class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">1. Student Name / ID</label>
                        <input type="text" id="student-input" placeholder="Type name or scan sheet..." 
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:bg-white transition-all text-base focus:ring-[#c80206]">
                    </div>
                    <div>
                        <label class="block text-xs font-bold uppercase tracking-wider text-gray-500 mb-1">2. Chromebook Asset Tag</label>
                        <input type="text" id="asset-input" placeholder="Scan device barcode label..." 
                               class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:bg-white transition-all text-base focus:ring-[#c80206]">
                    </div>
                    <div class="flex items-end">
                        <button onclick="processTransaction()" class="w-full text-white font-bold py-3 px-6 rounded-xl transition-all shadow-md active:scale-98 cursor-pointer" style="background-color: #c80206;">
                            Submit Transaction
                        </button>
                    </div>
                </div>
                
                <div id="scan-feedback" class="p-4 rounded-xl text-sm font-semibold hidden transition-all"></div>
            </div>
        </section>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <div>
                    <h2 class="text-lg font-bold text-gray-900">Classroom Cart Visualizer</h2>
                    <p id="cart-meta-display" class="text-sm text-gray-500 font-medium bg-gray-50 px-3 py-1 rounded-lg border border-gray-100 w-fit mt-1">
                        Loading assignment details...
                    </p>
                </div>
                <select id="cart-selector" onchange="loadCartData()" class="bg-gray-50 border border-gray-200 rounded-xl px-3 py-1.5 text-sm font-semibold focus:outline-none focus:ring-2 focus:ring-[#c80206]">
                    <optgroup label="7th Grade Carts">
                        <option id="opt-7th-Grade-Cart-A" value="7th-Grade-Cart-A">7th Grade - Cart A</option>
                        <option id="opt-7th-Grade-Cart-B" value="7th-Grade-Cart-B">7th Grade - Cart B</option>
                        <option id="opt-7th-Grade-Cart-C" value="7th-Grade-Cart-C">7th Grade - Cart C</option>
                        <option id="opt-7th-Grade-Cart-D" value="7th-Grade-Cart-D">7th Grade - Cart D</option>
                    </optgroup>
                    <optgroup label="6th Grade Carts">
                        <option id="opt-6th-Grade-Cart-A" value="6th-Grade-Cart-A">6th Grade - Cart A</option>
                        <option id="opt-6th-Grade-Cart-B" value="6th-Grade-Cart-B">6th Grade - Cart B</option>
                        <option id="opt-6th-Grade-Cart-C" value="6th-Grade-Cart-C">6th Grade - Cart C</option>
                        <option id="opt-6th-Grade-Cart-D" value="6th-Grade-Cart-D">6th Grade - Cart D</option>
                    </optgroup>
                    <optgroup label="Standalone">
                        <option value="Unassigned-Loose-Devices">Loose / Vault Devices</option>
                    </optgroup>
                </select>
            </div>

            <div id="cart-grid" class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-6 gap-2.5">
                <div class="col-span-full text-center py-8 text-gray-400 text-sm">Connecting to Firebase...</div>
            </div>
        </section>
    </main>

    <main id="view-admin-container" class="max-w-7xl mx-auto p-4 md:p-6 space-y-6 hidden">
        
        <section class="bg-
